name: ClusterFuzzLite batch fuzzing

# Nightly extended fuzzing across all targets. Companion to cflite_pr.yml
# (per-PR fuzzing of changed code). NOTE: ClusterFuzzLite's `mode: batch`
# does not populate SARIF results; crashes appear in the run's `artifacts`
# directory. PR-mode (code-change) is the path that surfaces findings to
# the Security tab.

on:
  schedule:
    - cron: '0 2 * * *'  # nightly at 02:00 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  BatchFuzzing:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]
    steps:
      - name: Build Fuzzers (${{ matrix.sanitizer }})
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: rust
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: ${{ matrix.sanitizer }}
      - name: Run ClusterFuzzLite batch fuzzing
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 600
          mode: batch
          sanitizer: ${{ matrix.sanitizer }}
