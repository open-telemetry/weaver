name: ClusterFuzzLite PR fuzzing

# Per-PR fuzzing of changed code. Companion to cflite_batch.yml (nightly
# scheduled batch runs). This workflow uses `mode: code-change`, which is the
# only ClusterFuzzLite mode that reliably emits SARIF for the Security tab.

on:
  pull_request:
    paths:
      - '**'
      - '!**/*.md'
      - '!docs/**'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  PRFuzzing:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Mark as PR build for build.sh
        run: touch .clusterfuzzlite/.pr_build
      - name: Build Fuzzers (${{ matrix.sanitizer }})
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: rust
          sanitizer: ${{ matrix.sanitizer }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          project-src-path: ${{ github.workspace }}
      - name: Run Fuzzers (${{ matrix.sanitizer }})
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: code-change
          sanitizer: ${{ matrix.sanitizer }}
          output-sarif: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: cifuzz-sarif/results.sarif
          category: clusterfuzzlite-${{ matrix.sanitizer }}
