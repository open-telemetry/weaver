[alias]
xtask = "run --package xtask --bin xtask --"

# These musl linker settings use `musl-gcc` which resolves to the native architecture's
# musl C compiler when `musl-tools` is installed (e.g., aarch64-linux-musl-gcc on arm64).
# For the release pipeline, each musl target is built on its native runner:
#   x86_64-unknown-linux-musl -> ubuntu-24.04 (x86_64)
#   aarch64-unknown-linux-musl -> ubuntu-24.04-arm (aarch64)
# This mirrors the approach used in cross-arch-build.sh for Docker images.
[target.aarch64-unknown-linux-musl]
linker = "musl-gcc"

[target.x86_64-unknown-linux-musl]
linker = "musl-gcc"
