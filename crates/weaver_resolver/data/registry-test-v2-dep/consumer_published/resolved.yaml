file_format: resolved/2.0.0
schema_url: https://consumer.example.com/schemas/1.0.0
attribute_catalog:
- key: server.port
  type: int
  examples:
  - 80
  - 443
  brief: The server port used by the consumer.
  stability: stable
- key: server.address
  type: string
  examples:
  - example.com
  brief: Server address.
  stability: stable
- key: server.address
