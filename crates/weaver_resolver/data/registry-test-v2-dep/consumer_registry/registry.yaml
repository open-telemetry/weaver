file_format: definition/2
metrics:
  - name: consumer.request.count
    requirement_level: recommended
    brief: Count of consumer requests.
    instrument: counter
    unit: "{request}"
    stability: stable
    attributes:
      - ref: server.address
        requirement_level: required
      - ref: server.port
        requirement_level: recommended
        brief: The server port used by the consumer.
  - name: consumer.request.active
    requirement_level: recommended
    brief: Number of active consumer requests.
    instrument: updowncounter
    unit: "{request}"
    stability: stable
    attributes:
      - ref: server.address
        brief: Yet another description.
        requirement_level: required
      - ref: server.port
        requirement_level: recommended
        brief: The server port used by the consumer.
