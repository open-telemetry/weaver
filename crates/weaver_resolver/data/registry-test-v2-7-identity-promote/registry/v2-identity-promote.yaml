file_format: definition/2
attributes:
  - key: test.attr
    type: int
    brief: Test attribute
    stability: stable
  - key: test.attr2
    type: string
    brief: Test attribute 2
    stability: stable

entities:
  - type: base.entity
    requirement_level: recommended
    identity:
      - ref: test.attr
    description:
      - ref: test.attr2
    brief: Base entity
    stability: stable

entity_refinements:
  # Valid: refines the descriptive attribute under `description`.
  - id: entity.refined.entity
    ref: base.entity
    brief: Refined entity
    description:
      - ref: test.attr2
        brief: Refined descriptive attribute
  # Invalid: test.attr2 is a descriptive attribute of base.entity and must be
  # refined under `description`, not `identity`.
  - id: entity.promoting.entity
    ref: base.entity
    brief: Promoting entity
    identity:
      - ref: test.attr2
        brief: Promoted descriptive attribute
