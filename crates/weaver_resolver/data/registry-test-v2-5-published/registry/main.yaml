file_format: 'definition/2'
attributes:
  - key: local.attr
    type: string
    brief: local attribute
    stability: stable
  - key: local.group.attr
    type: string
    brief: local group attribute
    stability: stable
spans:
- type: local-span
  requirement_level: recommended
  name:
    note: span
  brief: a local span
  note: a local span note
  kind: client
  stability: stable
  attributes:
  - ref: local.attr
attribute_groups:
- id: local.group
  brief: local group
  visibility: public
  stability: stable
  attributes:
  - ref: local.group.attr
    requirement_level: required
imports:
  spans:
    - imported.*
  attribute_groups:
    - imported.*
