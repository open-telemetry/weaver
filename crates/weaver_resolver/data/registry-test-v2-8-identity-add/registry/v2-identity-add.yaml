file_format: definition/2
attributes:
  - key: test.attr
    type: int
    brief: Test attribute
    stability: stable
  - key: test.attr2
    type: string
    brief: Test attribute 2
    stability: stable

entities:
  - type: base.entity
    requirement_level: recommended
    identity:
      - ref: test.attr
    brief: Base entity
    stability: stable

entity_refinements:
  # Valid: adds a brand new descriptive attribute.
  - id: entity.refined.entity
    ref: base.entity
    brief: Refined entity
    description:
      - ref: test.attr2
        brief: Added descriptive attribute
  # Invalid: introduces a new identity attribute that base.entity does not
  # declare — refinements may only refine existing identity attributes.
  - id: entity.adding.entity
    ref: base.entity
    brief: Adding entity
    identity:
      - ref: test.attr2
        brief: New identity attribute
