file_format: definition/2
attributes:
  - key: test.attr
    type: int
    brief: Test attribute
    stability: stable
  - key: test.attr2
    type: string
    brief: Test attribute 2
    stability: stable
  - key: test.attr3
    type: string
    brief: Test attribute 3
    stability: stable

attribute_groups:
  - id: test.group
    visibility: public
    brief: Test group
    stability: stable
    attributes:
      - ref: test.attr
  - id: test.refine.extras
    visibility: internal
    attributes:
      - ref: test.attr3
        requirement_level: recommended

metrics:
  - name: base.metric
    requirement_level: recommended
    instrument: histogram
    unit: s
    brief: Base metric
    stability: stable
    annotations:
      config:
        enabled: true
        mode: "fast"
        nested:
          a: 1
          b: 2
    attributes:
      - ref_group: test.group

metric_refinements:
  - id: metric.refined.metric
    ref: base.metric
    brief: Refined metric
    annotations:
      config:
        mode: "slow"
        timeout: 500
        nested:
          b: 99
          c: 3
    attributes:
      - ref_group: test.refine.extras
spans:
  - type: base.span
    requirement_level: recommended
    kind: client
    name:
      note: "base span"
    brief: Base span
    stability: stable

span_refinements:
  - id: span.refined.span
    ref: base.span
    brief: Refined span

events:
  - name: base.event
    requirement_level: recommended
    brief: Base event
    stability: stable

event_refinements:
  - id: event.refined.event
    ref: base.event
    brief: Refined event

entities:
  - type: base.entity
    requirement_level: recommended
    identity:
      - ref: test.attr
    description:
      - ref: test.attr2
    brief: Base entity
    stability: stable

entity_refinements:
  - id: entity.refined.entity
    ref: base.entity
    brief: Refined entity
    identity:
      - ref: test.attr
        brief: Refined identity attribute
      # Promotes a descriptive attribute of the base entity to identifying.
      - ref: test.attr2
    description:
      # Adds a new descriptive attribute.
      - ref: test.attr3
