file_format: definition/2
attributes:
  - key: test.attr
    type: int
    brief: Test attribute
    stability: stable
  - key: test.attr2
    type: string
    brief: Test attribute 2
    stability: stable

attribute_groups:
  - id: test.group
    visibility: public
    brief: Test group
    stability: stable
    attributes:
      - ref: test.attr

  - id: test.override.group
    visibility: internal
    attributes:
      - ref: test.attr
        note: OVERRIDE_NOTE

metrics:
  - name: base.metric
    instrument: histogram
    unit: s
    brief: Base metric
    stability: stable
    annotations:
      config:
        enabled: true
        mode: "fast"
        nested:
          a: 1
          b: 2
    attributes:
      - ref_group: test.group

metric_refinements:
  - id: metric.refined.metric
    ref: base.metric
    brief: Refined metric
    annotations:
      config:
        mode: "slow"
        timeout: 500
        nested:
          b: 99
          c: 3
spans:
  - type: base.span
    kind: client
    name:
      note: "base span"
    brief: Base span
    stability: stable
    attributes:
      - ref: test.attr

  - type: regular.span
    kind: client
    name:
      note: "regular span"
    brief: Regular span pulling override group via ref_group
    stability: stable
    attributes:
      - ref_group: test.override.group

span_refinements:
  - id: span.refined.span
    ref: base.span
    brief: Refined span
    stability: stable
    attributes:
      - ref_group: test.override.group

events:
  - name: base.event
    brief: Base event
    stability: stable

event_refinements:
  - id: event.refined.event
    ref: base.event
    brief: Refined event

entities:
  - type: base.entity
    identity:
      - ref: test.attr
    brief: Base entity
    stability: stable

entity_refinements:
  - id: entity.refined.entity
    ref: base.entity
    brief: Refined entity
    description:
      - ref: test.attr2
