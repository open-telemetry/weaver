groups:
  - id: shared.attributes
    type: attribute_group
    brief: Attributes shared between our signals.
    attributes:
      - id: auction.id
        type: int
        brief: >
          The id of the auction.
        stability: stable
      - id: auction.name
        type: string
        brief: >
          The name of the auction
        stability: stable
        examples: ["Fish for sale"]

  - id: metric.auction.bid.count
    type: metric
    metric_name: auction.bid.count
    stability: stable
    brief: "Count of all bids we've seen"
    instrument: counter
    unit: "{bid}"
    metric_requirement_level: recommended
    attributes:
      - ref: auction.id
        requirement_level: required
      - ref: auction.name
        requirement_level: recommended
      - ref: error.type
        requirement_level: required

  - id: custom.span
    type: span
    span_kind: client
    name: custom.client
    brief: custom span
    attributes:
      - ref: error.type
    extends: span.server.request

  - id: custom.group
    type: attribute_group
    brief: custom group
    attributes:
      - ref: error.type
    extends: group.server.attributes

imports:
  metrics:
    - example.*
  entities:
    - gcp.*
  events:
    - session.start
  spans:
    - server.request
  attribute_groups:
    - server.attributes
