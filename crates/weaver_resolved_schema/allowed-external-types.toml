    "serde_core::ser::Serialize",
    "serde_core::de::Deserialize",
    "weaver_common::*",
    "weaver_semconv::*",
    "weaver_version::*",
    "schemars::JsonSchema",
    "utoipa::ToSchema",
    "utoipa::__dev::ComposeSchema",
]
